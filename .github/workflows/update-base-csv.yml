name: Atualizar base.csv

on:
  schedule:
- cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Baixar CSV publicado do Google Sheets
        run: |
          curl -L "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoaI1XIVblJI8N-QhombAJAaqCLtmf4J1DZq9exmcu8mFkoJNQAIx-Udi8E1uudjBPl9Ps4oFwXpEk/pub?gid=582069458&single=true&output=csv" -o base.csv

      - name: Commit se houver alteração
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add base.csv
          git diff --cached --quiet || git commit -m "Atualiza base.csv automaticamente"
          git push
